# Ask my agent — NAS deploy.
#
# Local dev:   docker compose up --build -d  → http://localhost:5173
# Production:  traffic arrives via the CF tunnel in the StoryBrew stack
#              through the shared cf-tunnel-net Docker network.

version: '3.8'

services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      # Container-local paths (overriding .env defaults).
      MEMORY_DIR: /app/memory
      CHROMA_DIR: /app/chroma_db
      CREDENTIALS_FILE: /app/credentials.yaml
      LOG_FILE: /app/logs/requests.ndjson
      KNOWLEDGE_DB: /app/data/knowledge.db
      # Widen CORS for the proxied frontend container + production domain.
      CORS_ORIGINS: "http://localhost:5173,http://localhost:4173,https://sebastiaandenboer.org,https://www.sebastiaandenboer.org"
    volumes:
      - ./memory:/app/memory
      - ./chroma_db:/app/chroma_db
      - ./credentials.yaml:/app/credentials.yaml
      - ./logs:/app/logs
      - ./data:/app/data
      - ./frontend/public:/app/public:ro
    # Allow the backend container to reach Ollama running on the host Mac/NAS.
    # No effect when LLM_PROVIDER != ollama.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - digital-twin-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./frontend
    container_name: digital-twin-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"          # local dev: localhost:5173 → nginx :80
    restart: unless-stopped
    networks:
      - digital-twin-net
      - cf-tunnel-net       # shared with StoryBrew tunnel

networks:
  digital-twin-net:         # internal backend ↔ frontend
    driver: bridge
  cf-tunnel-net:            # shared with StoryBrew's cloudflared
    external: true
