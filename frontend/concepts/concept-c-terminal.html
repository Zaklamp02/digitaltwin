<title>Concept C Рђћ "The Terminal"</title>
<!--
  CONCEPT C: THE TERMINAL
  ========================
  Philosophy: The site IS a conversation. No chrome, no nav Рђћ just a prompt.
  
  Starts as a minimal terminal greeting. You type something and the digital
  twin responds inline. Type "help" to see commands. Type "projects" to see
  projects. Type anything else and it goes to the AI. Easter eggs hidden
  throughout (try "sudo", "rm -rf", "42", "xyzzy").

  Progressive disclosure: the more you type, the more the site reveals.
  But it's also immediately usable Рђћ just type a question.

  Inspired by: yangeorget.net (terminal aesthetic, hidden depth),
  the hacker/nerd identity, puzzle/discovery element.
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --ink: #c9d1d9;
    --ink-dim: #484f58;
    --accent: #2dd4bf;
    --accent-dim: rgba(45, 212, 191, 0.15);
    --error: #f97583;
    --comment: #6e7681;
  }

  body {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* РћђРћђ TERMINAL WINDOW РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
  .terminal {
    flex: 1;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
  }

  /* Title bar */
  .title-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }

  .title-text {
    flex: 1;
    text-align: center;
    font-size: 0.7rem;
    color: var(--ink-dim);
  }

  /* Output area */
  .output {
    flex: 1;
    font-size: 0.85rem;
    line-height: 1.7;
    overflow-y: auto;
  }

  .output .line {
    margin-bottom: 0.15rem;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .output .ascii {
    color: var(--accent);
    line-height: 1.2;
    margin-bottom: 1rem;
    font-size: 0.55rem;
    letter-spacing: 0.05em;
  }

  .output .comment { color: var(--comment); }
  .output .accent { color: var(--accent); }
  .output .error { color: var(--error); }
  .output .bold { font-weight: 700; }
  .output .link {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }

  .output .prompt-prefix {
    color: var(--accent);
    user-select: none;
  }

  .output .user-input {
    color: var(--ink);
  }

  /* Section cards (revealed by commands) */
  .output .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0.75rem;
    margin: 0.75rem 0;
  }

  .output .card {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
  }

  .output .card .card-title {
    color: var(--accent);
    font-weight: 700;
    font-size: 0.8rem;
  }

  .output .card .card-desc {
    color: var(--ink-dim);
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }

  /* РћђРћђ INPUT LINE РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ */
  .input-line {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 0.5rem;
    font-size: 0.85rem;
  }

  .input-prefix {
    color: var(--accent);
    white-space: nowrap;
    user-select: none;
  }

  .input-field {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: inherit;
    caret-color: var(--accent);
    padding-left: 0.25rem;
  }

  /* Blinking cursor placeholder */
  .input-field::placeholder {
    color: var(--ink-dim);
    opacity: 0.5;
  }

  /* Typing animation for initial text */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .cursor-blink::after {
    content: 'Рќѕ';
    animation: blink 1s step-end infinite;
    color: var(--accent);
    font-size: 0.85rem;
  }

  /* Footer hint */
  .hint {
    text-align: center;
    padding: 1rem 2rem;
    font-size: 0.6rem;
    color: var(--ink-dim);
  }

  .hint kbd {
    background: rgba(255,255,255,0.06);
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.1);
    font-family: inherit;
    font-size: inherit;
  }
</style>
</head>

  // Echo the command
  line(`<span class="prompt-prefix">visitor@sebastiaan ~ % </span><span class="user-input">${escapeHtml(raw)}</span>`);

  const cmd = raw.toLowerCase();

  if (COMMANDS[cmd]) {
    COMMANDS[cmd]();
  } else if (cmd.startsWith('sudo ')) {
    COMMANDS['sudo']();
  } else {
    // Anything else Рєњ digital twin would handle it
    line('');
    line('<span class="accent">twin Рєњ</span> <span class="comment">[In the real site, the digital twin would respond here via SSE streaming]</span>');
    line('');
    line(`<span class="comment"># Your question: "${escapeHtml(raw)}"</span>`);
    line('<span class="comment"># This prototype doesn\'t have the backend connected.</span>');
    line('');
  }

  scrollBottom();
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.addEventListener('click', () => cmdInput.focus());
